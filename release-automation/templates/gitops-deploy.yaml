apiVersion: xl-release/v1
kind: Templates
spec:
- template: "GitOps ArgoCD Deployment"
  description: |
    Deploiement GitOps dynamique via ArgoCD.
    Utilise les variables de folder de type Configuration.

  variables:
  - key: gitlabServer
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: automationProject
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: automationRef
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: catalogProject
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: catalogRef
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: argocdDevServer
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: argocdStagingServer
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: argocdProdServer
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: releaseManagersTeam
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: componentName
    type: xlrelease.StringVariable

  - key: targetEnvironmentsCsv
    type: xlrelease.StringVariable

  - key: imageTag
    type: xlrelease.StringVariable

  - key: dryRun
    type: xlrelease.StringVariable
    value: "false"

  - key: commonLibPy
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: componentsYaml
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: environmentsYaml
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: availableComponentsText
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: availableEnvironmentsText
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: componentsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: environmentsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: componentConfigJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: targetEnvironmentsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: selectedEnvConfigsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: needsApproval
    type: xlrelease.StringVariable
    value: "false"
    showOnReleaseStart: false

  - key: approvalEnvsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: gitopsProject
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: gitopsBaseBranch
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: releaseBranch
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: mergeRequestIid
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: mergeRequestUrl
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: argocdDeployResultsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: waitResultsJson
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: allHealthy
    type: xlrelease.StringVariable
    value: "false"
    showOnReleaseStart: false

  - key: performRollback
    type: xlrelease.StringVariable
    value: "false"
    showOnReleaseStart: false

  - key: rollbackTag
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: deploymentReport
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: overallSuccess
    type: xlrelease.StringVariable
    value: "false"
    showOnReleaseStart: false

  - key: releaseId
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  - key: releaseOwner
    type: xlrelease.StringVariable
    showOnReleaseStart: false

  phases:

  # ============================================================
  # PHASE 1 : Chargement
  # ============================================================
  - phase: "1 - Chargement"
    tasks:

    - name: "1.1 - Diagnostic variables de folder"
      type: xlrelease.ScriptTask
      script: |
        required_vars = [
            "gitlabServer",
            "automationProject",
            "automationRef",
            "catalogProject",
            "catalogRef",
            "argocdDevServer",
            "argocdStagingServer",
            "argocdProdServer"
        ]
        missing = []
        for v in required_vars:
            val = releaseVariables.get(v)
            if val is None or val == "":
                print("[MISSING] %s" % v)
                missing.append(v)
            else:
                val_type = type(val).__name__
                print("[OK]      %s = %s (type: %s)" % (v, str(val)[:60], val_type))
                try:
                    print("          -> url = %s" % val.getProperty("url"))
                except:
                    pass

        if missing:
            raise Exception(
                "Variables de folder manquantes : %s\n"
                "Configurer dans le folder DAI Release." % (
                    ", ".join(missing)
                )
            )
        print("\nToutes les variables de folder sont presentes.")

    - name: "1.2 - Charger fichiers GitLab"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl

        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        # Recuperer GitLab depuis variable de configuration
        gl_server = releaseVariables.get("gitlabServer")
        gl_url = None
        gl_token = None

        # Essayer getProperty
        try:
            gl_url = gl_server.getProperty("url")
            gl_token = gl_server.getProperty("token")
        except:
            pass

        # Fallback: chercher par titre
        if not gl_url:
            try:
                title = str(gl_server)
                items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
                if items:
                    gl_url = items[0].getProperty("url")
                    gl_token = items[0].getProperty("token")
            except:
                pass

        if not gl_url or not gl_token:
            raise Exception(
                "Impossible de lire les credentials GitLab.\n"
                "Variable gitlabServer = %s (type: %s)" % (
                    str(gl_server)[:100], type(gl_server).__name__
                )
            )

        gl_url = gl_url.rstrip("/")
        print("GitLab URL : %s" % gl_url)

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url,
                quote(project, safe=""),
                quote(path, safe=""),
                quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            try:
                resp = urlopen(req, context=ssl_ctx, timeout=30)
                data = json.loads(resp.read().decode("utf-8"))
                c = data.get("content", "")
                e = data.get("encoding", "base64")
                if e == "base64":
                    return base64.b64decode(c).decode("utf-8")
                return c
            except HTTPError as ex:
                body = ex.read().decode("utf-8")
                raise Exception("GitLab HTTP %d [%s]: %s" % (ex.code, path, body))

        auto_proj = releaseVariables["automationProject"]
        auto_ref = releaseVariables["automationRef"]
        cat_proj = releaseVariables["catalogProject"]
        cat_ref = releaseVariables["catalogRef"]

        print("\nChargement lib.py ...")
        releaseVariables["commonLibPy"] = read_file(
            auto_proj, "scripts/common/lib.py", auto_ref
        )
        print("OK (%d octets)" % len(releaseVariables["commonLibPy"]))

        print("\nChargement components.yaml ...")
        releaseVariables["componentsYaml"] = read_file(
            cat_proj, "config/components.yaml", cat_ref
        )
        print("OK (%d octets)" % len(releaseVariables["componentsYaml"]))

        print("\nChargement environments.yaml ...")
        releaseVariables["environmentsYaml"] = read_file(
            cat_proj, "config/environments.yaml", cat_ref
        )
        print("OK (%d octets)" % len(releaseVariables["environmentsYaml"]))

    - name: "1.3 - Afficher le catalogue"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        # Lire le script show_catalog.py depuis GitLab
        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url, quote(project, safe=""),
                quote(path, safe=""), quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            resp = urlopen(req, context=ssl_ctx, timeout=30)
            data = json.loads(resp.read().decode("utf-8"))
            c = data.get("content", "")
            e = data.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/show_catalog.py",
            releaseVariables["automationRef"]
        )

        scope = {
            "releaseVariables": releaseVariables,
            "configurationApi": configurationApi,
            "release": release
        }
        exec(releaseVariables["commonLibPy"], scope)
        exec(task_code, scope)

        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for key, value in result.items():
                if isinstance(value, (dict, list)):
                    releaseVariables[key] = json.dumps(value)
                else:
                    releaseVariables[key] = ("" if value is None else str(value))

  # ============================================================
  # PHASE 2 : Saisie utilisateur
  # ============================================================
  - phase: "2 - Saisie et Validation"
    tasks:

    - name: "2.1 - Saisir les parametres"
      type: xlrelease.UserInputTask
      description: |
        COMPOSANTS DISPONIBLES :
        ${availableComponentsText}

        ENVIRONNEMENTS DISPONIBLES :
        ${availableEnvironmentsText}

        Remplir les champs ci-dessous.
      variables:
      - componentName
      - targetEnvironmentsCsv
      - imageTag

    - name: "2.2 - Valider et preparer"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url, quote(project, safe=""),
                quote(path, safe=""), quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            resp = urlopen(req, context=ssl_ctx, timeout=30)
            data = json.loads(resp.read().decode("utf-8"))
            c = data.get("content", "")
            e = data.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/validate_selection.py",
            releaseVariables["automationRef"]
        )

        scope = {
            "releaseVariables": releaseVariables,
            "configurationApi": configurationApi,
            "release": release
        }
        exec(releaseVariables["commonLibPy"], scope)
        exec(task_code, scope)

        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for key, value in result.items():
                if isinstance(value, (dict, list)):
                    releaseVariables[key] = json.dumps(value)
                else:
                    releaseVariables[key] = ("" if value is None else str(value))

        # Extraire les variables simples pour les tasks plugin GitLab
        component = json.loads(releaseVariables["componentConfigJson"])
        releaseVariables["gitopsProject"] = component.get("gitopsRepoProject", "")
        releaseVariables["gitopsBaseBranch"] = component.get("gitopsRepoBranch", "main")
        releaseVariables["releaseId"] = str(release.id)
        releaseVariables["releaseOwner"] = str(release.owner)
        releaseVariables["releaseBranch"] = "release/%s-%s-%s" % (
            component.get("name", "app"),
            releaseVariables["imageTag"],
            str(release.id)
        )

        print("gitopsProject   : %s" % releaseVariables["gitopsProject"])
        print("releaseBranch   : %s" % releaseVariables["releaseBranch"])
        print("needsApproval   : %s" % releaseVariables["needsApproval"])

  # ============================================================
  # PHASE 3 : GitOps Update
  # ============================================================
  - phase: "3 - Mise a jour GitOps"
    tasks:

    - name: "3.1 - Creer la branche"
      type: gitlab.CreateBranch
      server: "${gitlabServer}"
      project: "${gitopsProject}"
      branch: "${releaseBranch}"
      ref: "${gitopsBaseBranch}"

    - name: "3.2 - Mettre a jour les values"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        component = json.loads(releaseVariables["componentConfigJson"])
        target_envs = json.loads(releaseVariables["targetEnvironmentsJson"])
        image_tag = releaseVariables["imageTag"]
        branch = releaseVariables["releaseBranch"]
        release_id = releaseVariables["releaseId"]
        gitops_proj = releaseVariables["gitopsProject"]
        base_branch = releaseVariables["gitopsBaseBranch"]
        chart_path = component.get("chartPath", "")

        def gitlab_file_op(method, project, file_path, body=None, ref=None):
            url = "%s/api/v4/projects/%s/repository/files/%s" % (
                gl_url, quote(project, safe=""), quote(file_path, safe="")
            )
            if ref:
                url += "?ref=" + quote(ref, safe="")
            data = json.dumps(body).encode("utf-8") if body else None
            req = Request(url, data=data)
            req.get_method = lambda: method
            req.add_header("PRIVATE-TOKEN", gl_token)
            req.add_header("Content-Type", "application/json")
            try:
                resp = urlopen(req, context=ssl_ctx, timeout=30)
                raw = resp.read()
                return json.loads(raw.decode("utf-8")) if raw else {}
            except HTTPError as e:
                return {"_error": e.code, "_body": e.read().decode("utf-8")}

        def read_file(proj, path, ref):
            resp = gitlab_file_op("GET", proj, path, ref=ref)
            if "_error" in resp:
                return None
            c = resp.get("content", "")
            e = resp.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        def write_file(proj, path, content, br, msg):
            body = {
                "branch": br, "content": content,
                "commit_message": msg, "encoding": "text"
            }
            resp = gitlab_file_op("PUT", proj, path, body=body)
            if resp.get("_error") in (400, 404):
                resp = gitlab_file_op("POST", proj, path, body=body)
            if "_error" in resp:
                raise Exception("Write error %s: %s" % (path, resp.get("_body","")))

        for env_name in target_envs:
            fpath = "%s/values-%s.yaml" % (chart_path, env_name)
            print("Update: %s" % fpath)

            current = read_file(gitops_proj, fpath, base_branch)
            if current:
                lines = current.split("\n")
                new_lines = []
                done = False
                for line in lines:
                    if line.strip().startswith("tag:"):
                        indent = len(line) - len(line.lstrip())
                        new_lines.append('%stag: "%s"' % (" " * indent, image_tag))
                        done = True
                    else:
                        new_lines.append(line)
                if not done:
                    new_lines.append('  tag: "%s"' % image_tag)
                new_content = "\n".join(new_lines)
            else:
                new_content = 'image:\n  tag: "%s"\n' % image_tag

            write_file(gitops_proj, fpath, new_content, branch,
                "chore: update image.tag=%s for %s [release-%s]" % (
                    image_tag, env_name, release_id
                )
            )
            print("  OK")

    - name: "3.3 - Creer la MR"
      type: gitlab.CreateMergeRequest
      server: "${gitlabServer}"
      project: "${gitopsProject}"
      sourceBranch: "${releaseBranch}"
      targetBranch: "${gitopsBaseBranch}"
      title: "deploy: ${componentName} v${imageTag} [${releaseId}]"
      description: "Deploy ${componentName} v${imageTag} to ${targetEnvironmentsCsv}"

    - name: "3.4 - Merger la MR"
      type: gitlab.MergeMergeRequest
      server: "${gitlabServer}"
      project: "${gitopsProject}"
      mergeRequestId: "${mergeRequestIid}"

    - name: "3.5 - Creer le tag"
      type: gitlab.CreateTag
      server: "${gitlabServer}"
      project: "${gitopsProject}"
      tagName: "deploy/${componentName}/${imageTag}"
      ref: "${gitopsBaseBranch}"
      message: "Deploy ${componentName} v${imageTag} [${releaseId}]"

  # ============================================================
  # PHASE 4 : Approbation
  # ============================================================
  - phase: "4 - Approbation"
    tasks:

    - name: "4.1 - Approbation Production"
      type: xlrelease.GateTask
      precondition: "releaseVariables['needsApproval'] == 'true'"
      description: |
        Approbation requise.

        Composant : ${componentName}
        Version   : ${imageTag}
        Envs      : ${approvalEnvsJson}
      conditions:
      - name: "Tests staging valides"
        checked: false
      - name: "Plan rollback confirme"
        checked: false
      - name: "Equipe notifiee"
        checked: false

  # ============================================================
  # PHASE 5 : Deploiement ArgoCD
  # ============================================================
  - phase: "5 - Deploiement ArgoCD"
    tasks:

    - name: "5.1 - Deployer sur ArgoCD"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url, quote(project, safe=""),
                quote(path, safe=""), quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            resp = urlopen(req, context=ssl_ctx, timeout=30)
            data = json.loads(resp.read().decode("utf-8"))
            c = data.get("content", "")
            e = data.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        scope = {
            "releaseVariables": releaseVariables,
            "configurationApi": configurationApi,
            "release": release
        }
        exec(releaseVariables["commonLibPy"], scope)

        # Deploy
        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/build_argocd_payload.py",
            releaseVariables["automationRef"]
        )
        exec(task_code, scope)
        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for k, v in result.items():
                releaseVariables[k] = json.dumps(v) if isinstance(v, (dict, list)) else ("" if v is None else str(v))

        # Wait
        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/wait_sync.py",
            releaseVariables["automationRef"]
        )
        exec(task_code, scope)
        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for k, v in result.items():
                releaseVariables[k] = json.dumps(v) if isinstance(v, (dict, list)) else ("" if v is None else str(v))

  # ============================================================
  # PHASE 6 : Rapport
  # ============================================================
  - phase: "6 - Rapport"
    tasks:

    - name: "6.1 - Generer le rapport"
      type: xlrelease.ScriptTask
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url, quote(project, safe=""),
                quote(path, safe=""), quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            resp = urlopen(req, context=ssl_ctx, timeout=30)
            data = json.loads(resp.read().decode("utf-8"))
            c = data.get("content", "")
            e = data.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        scope = {
            "releaseVariables": releaseVariables,
            "configurationApi": configurationApi,
            "release": release
        }
        exec(releaseVariables["commonLibPy"], scope)

        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/report.py",
            releaseVariables["automationRef"]
        )
        exec(task_code, scope)
        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for k, v in result.items():
                releaseVariables[k] = json.dumps(v) if isinstance(v, (dict, list)) else ("" if v is None else str(v))

    - name: "6.2 - Verifier resultat"
      type: xlrelease.ScriptTask
      script: |
        success = releaseVariables.get("overallSuccess", "false")
        report = releaseVariables.get("deploymentReport", "")
        print("")
        print("=" * 60)
        print(report)
        print("=" * 60)
        if success != "true":
            raise Exception("Deploiement echoue. Voir rapport.")

  # ============================================================
  # PHASE 7 : Rollback
  # ============================================================
  - phase: "7 - Rollback"
    tasks:

    - name: "7.1 - Rollback necessaire ?"
      type: xlrelease.UserInputTask
      precondition: "releaseVariables['allHealthy'] == 'false'"
      description: |
        Echec detecte.

        ${deploymentReport}

        Voulez-vous rollback ?
      variables:
      - performRollback
      - rollbackTag

    - name: "7.2 - Executer rollback"
      type: xlrelease.ScriptTask
      precondition: "releaseVariables['performRollback'] == 'true'"
      script: |
        import json
        import base64
        import ssl
        try:
            from urllib2 import Request, urlopen, HTTPError
            from urllib import quote
        except ImportError:
            from urllib.request import Request, urlopen
            from urllib.error import HTTPError
            from urllib.parse import quote

        gl_server = releaseVariables.get("gitlabServer")
        try:
            gl_url = gl_server.getProperty("url").rstrip("/")
            gl_token = gl_server.getProperty("token")
        except:
            title = str(gl_server)
            items = configurationApi.searchByTypeAndTitle("gitlab.Server", title)
            gl_url = items[0].getProperty("url").rstrip("/")
            gl_token = items[0].getProperty("token")

        ssl_ctx = ssl.create_default_context()
        ssl_ctx.check_hostname = False
        ssl_ctx.verify_mode = ssl.CERT_NONE

        def read_file(project, path, ref):
            url = "%s/api/v4/projects/%s/repository/files/%s?ref=%s" % (
                gl_url, quote(project, safe=""),
                quote(path, safe=""), quote(ref, safe="")
            )
            req = Request(url)
            req.add_header("PRIVATE-TOKEN", gl_token)
            resp = urlopen(req, context=ssl_ctx, timeout=30)
            data = json.loads(resp.read().decode("utf-8"))
            c = data.get("content", "")
            e = data.get("encoding", "base64")
            return base64.b64decode(c).decode("utf-8") if e == "base64" else c

        scope = {
            "releaseVariables": releaseVariables,
            "configurationApi": configurationApi,
            "release": release
        }
        exec(releaseVariables["commonLibPy"], scope)

        task_code = read_file(
            releaseVariables["automationProject"],
            "scripts/tasks/rollback.py",
            releaseVariables["automationRef"]
        )
        exec(task_code, scope)
        result = scope["run_in_dai"](releaseVariables, configurationApi)
        if result:
            for k, v in result.items():
                releaseVariables[k] = json.dumps(v) if isinstance(v, (dict, list)) else ("" if v is None else str(v))